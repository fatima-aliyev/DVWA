name: DVWA Advanced SAST Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep Advanced SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: |
          # Semgrep-i quraşdır
          python3 -m pip install semgrep
          
          # Skan et və SARIF formatında çıxart
          semgrep ci \
            --config p/security-audit \
            --config p/php \
            --config p/secrets \
            --config p/vulnerability \
            --config p/owasp-top-ten \
            --config p/ci \
            --sarif > semgrep-results.sarif || true   # Xəta olsa belə davam et

      - name: Upload SARIF Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Print Summary
        run: |
          echo "========================================"
          echo "✅ Semgrep SAST Scan Completed"
          echo "🔍 Bütün tapıntıları görmək üçün:"
          echo "   → Security → Code scanning alerts"
          echo "========================================"
          echo "Pipeline bitdi. Vulnerability-lər GitHub Security tab-da gözəl göstəriləcək."
