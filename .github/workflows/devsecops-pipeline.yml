name: DVWA Advanced SAST Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep Advanced SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: |
          python3 -m pip install semgrep
          
          echo "🔍 Semgrep skanı başlayır..."
          semgrep ci \
            --config p/security-audit \
            --config p/php \
            --config p/secrets \
            --config p/vulnerability \
            --config p/owasp-top-ten \
            --config p/ci \
            --severity ERROR \
            --severity WARNING \
            --output semgrep-results.sarif || true

          echo ""
          echo "📊 SCAN NƏTİCƏSİ:"
          echo "=============================="
          if [ -f semgrep-results.sarif ]; then
            echo "✅ SARIF faylı yaradıldı. GitHub Security-yə göndərildi."
          else
            echo "⚠️ SARIF faylı yaradıla bilmədi."
          fi
          echo "=============================="

      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Final Summary
        run: |
          echo "========================================"
          echo "✅ Pipeline Tamamlandı!"
          echo "📍 Nəticələri yoxlamaq üçün:"
          echo "   1. Security → Code scanning alerts"
          echo "   2. Bu run-un log-una bax (yuxarıdakı hissə)"
          echo "========================================"
