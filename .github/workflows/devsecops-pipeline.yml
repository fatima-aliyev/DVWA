name: DVWA Advanced SAST Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep Advanced SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep & Generate SARIF
        run: |
          python3 -m pip install semgrep
          
          semgrep ci \
            --config p/security-audit \
            --config p/php \
            --config p/secrets \
            --config p/vulnerability \
            --config p/owasp-top-ten \
            --config p/ci \
            --sarif \
            --output semgrep-results.sarif || true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Show Scan Summary
        run: |
          echo "========================================"
          echo "✅ Semgrep SAST Scan Tamamlandı"
          echo "📊 Tapıntıları yoxlamaq üçün:"
          echo "   Security → Code scanning alerts"
          echo "========================================"
          echo "Əgər alert görünmürsə, 1-2 dəqiqə gözləyin və səhifəni yeniləyin."
