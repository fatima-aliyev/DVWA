name: DVWA Advanced SAST Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep Advanced SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: |
          python3 -m pip install semgrep --quiet
          
          echo "🔍 Semgrep skanı başlayır..."
          semgrep ci \
            --config p/security-audit \
            --config p/php \
            --config p/secrets \
            --config p/vulnerability \
            --config p/owasp-top-ten \
            --config p/ci \
            --sarif \
            --sarif-output semgrep-results.sarif || true

          echo ""
          echo "📊 SCAN NƏTİCƏSİ:"
          if [ -f semgrep-results.sarif ]; then
            echo "✅ SARIF faylı uğurla yaradıldı!"
            ls -lh semgrep-results.sarif
          else
            echo "⚠️ SARIF faylı yaradıla bilmədi."
          fi

      - name: Upload SARIF Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        if: always()

      - name: Final Summary
        run: |
          echo "========================================"
          echo "✅ DVWA Semgrep SAST Pipeline Tamamlandı!"
          echo "📍 Nəticələri burada yoxla:"
          echo "   Security → Code scanning alerts"
          echo "========================================"
