name: DVWA Semgrep SAST Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep Advanced SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/php
            p/secrets
            p/vulnerability
            p/ci
          scan-unknown-extensions: true
          # Sarı və aşağı səviyyəli tapıntıları da göstərmək istəsən:
          # severity: ERROR,WARNING
