name: DVWA Advanced DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep (Security Rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit

  dependency-check:
    name: 📦 Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PHP & Composer
        run: |
          sudo apt update
          sudo apt install -y php php-cli unzip
          curl -sS https://getcomposer.org/installer | php
          sudo mv composer.phar /usr/local/bin/composer

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist || true

      - name: Run Composer Audit
        run: composer audit || true

  secrets-scan:
    name: 🔐 Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: false

  container-scan:
    name: 🐳 Docker Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t dvwa:latest .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: dvwa:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1  # HIGH/CRITICAL varsa pipeline fail olsun

  security-report:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [semgrep, dependency-check, secrets-scan, container-scan]
    steps:
      - name: Print Summary
        run: |
          echo "=================================="
          echo "✅ DVWA DevSecOps Pipeline Completed"
          echo "SAST + Dependencies + Secrets + Container Scan Done"
          echo "=================================="
