name: DVWA Advanced SAST Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep Advanced SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      # Ən son Node.js mühitinə tam uyğun versiya
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        continue-on-error: true 
        run: |
          python3 -m pip install semgrep --quiet
          echo "🔍 Semgrep skanı başlayır..."
          semgrep ci \
            --config p/security-audit \
            --config p/php \
            --config p/secrets \
            --config p/vulnerability \
            --config p/owasp-top-ten \
            --config p/ci \
            --sarif \
            --sarif-output semgrep-results.sarif

      # Node 24 dəstəkli ən son upload-artifact versiyası
      - name: 📦 Upload SARIF as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-raw-results
          path: semgrep-results.sarif

      # v3-dən v4-ə keçid etdik (Xəbərdarlığı aradan qaldırır)
      - name: Upload SARIF Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        if: always()
