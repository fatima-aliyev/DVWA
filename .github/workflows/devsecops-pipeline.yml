name: DVWA Advanced SAST Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    name: 🔍 Semgrep Advanced SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # Code Scanning üçün vacib
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/php
            p/secrets
            p/vulnerability
            p/owasp-top-ten
            p/ci
            p/r2c-security
          scan-unknown-extensions: true
          generate-sarif: true          # GitHub Code Scanning üçün
          sarif-output: semgrep-results.sarif

      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Summary
        run: |
          echo "========================================"
          echo "🔍 Semgrep SAST Scan Completed"
          echo "Findings: Check 'Security' tab in GitHub for full details"
          echo "📍 Security → Code scanning alerts"
          echo "========================================"
